services:
  web:
    build:
      context: .
      dockerfile: portfolio.Dockerfile
    image: portfolio-v2:latest
    container_name: portfolio-v2
    ports:
      - "${HOST_PORT:-8090}:8080"
    environment:
      ENV: prod
      PORT: 8080
      ROOT_DIR: /app
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ping >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
